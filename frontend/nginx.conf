server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: unknown paths fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # NOTE: no /api proxy here. In this deployment the ALB routes /api/* to the
  # backend service (see ApiListenerRule in infra/app-ecs.yaml), so nginx only
  # serves the static SPA. (Locally, docker-compose also relies on the same
  # split via the compose network — if you run compose, route /api at the ALB
  # equivalent or add a proxy with a resolver; do NOT hardcode a bare upstream
  # host, which fails to resolve at startup outside compose.)
}