server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: unknown paths fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend container (one origin -> no CORS).
  # "backend" resolves via Docker's embedded DNS on the compose network.
  # (On ECS you'd instead let the ALB route /api/* to the backend service.)
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
