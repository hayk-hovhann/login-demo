name: backend CI (reusable)

# Reusable CI for the backend. Not self-triggering — called by ci.yml via
# `uses:`. Contains ONLY validation (lint/typecheck/build/docker/scout); the
# CD half (ECR push) lives in cd.yml.
on:
  workflow_call:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t login-demo-backend:ci .

      - name: Docker Scout (CVE quickview)
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: login-demo-backend:ci
          only-severities: critical,high
