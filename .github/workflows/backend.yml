name: backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- CI: runs on PRs and on main ----------
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t login-demo-backend:ci .

      - name: Docker Scout (CVE quickview)
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: login-demo-backend:ci
          only-severities: critical,high

  # ---------- CD: build + push image to ECR, ONLY on main ----------
  push:
    needs: backend-build                      # only runs if build passed
    if: github.ref == 'refs/heads/main'       # only on main (not PRs)
    runs-on: ubuntu-latest
    permissions:
      id-token: write                         # required for OIDC (mint the token)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: login-demo-backend
          SHA: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPO:$SHA" -t "$REGISTRY/$REPO:latest" ./backend
          docker push "$REGISTRY/$REPO:$SHA"
          docker push "$REGISTRY/$REPO:latest"
          echo "Pushed $REGISTRY/$REPO:$SHA and :latest"
